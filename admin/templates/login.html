<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - RSS 订阅源管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: #666;
        }
        
        .login-form {
            margin-bottom: 24px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: monospace;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .error-icon {
            font-size: 18px;
        }
        
        .login-button {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-footer {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 24px;
        }
        
        .security-note {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            margin-top: 24px;
            line-height: 1.6;
        }
        
        .security-note strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">🔐</div>
            <h1 class="login-title">后台管理登录</h1>
            <p class="login-subtitle">RSS 订阅源管理系统</p>
        </div>
        
        {% if error %}
        <div class="error-message">
            <span class="error-icon">⚠️</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}
        
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label for="authCode">授权码 (AUTH_CODE)</label>
                <input 
                    type="password" 
                    id="authCode" 
                    name="auth_code" 
                    placeholder="请输入授权码"
                    autocomplete="off"
                    required
                    autofocus
                >
            </div>
            
            <button type="submit" class="login-button" id="loginButton">
                登录
            </button>
        </form>
        
        <div class="security-note">
            <strong>🛡️ 安全提示:</strong><br>
            授权码用于保护后台管理系统安全。请妥善保管，不要泄露给他人。
        </div>
        
        <div class="login-footer">
            © 2026 RSS AI 智能推送系统
        </div>
    </div>
    
    <script>
        const loginForm = document.getElementById('loginForm');
        const loginButton = document.getElementById('loginButton');
        const authCodeInput = document.getElementById('authCode');
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const authCode = authCodeInput.value.trim();
            
            if (!authCode) {
                alert('请输入授权码');
                return;
            }
            
            // 禁用按钮
            loginButton.disabled = true;
            loginButton.textContent = '登录中...';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        auth_code: authCode
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 登录成功，跳转到首页
                    window.location.href = '/';
                } else {
                    // 登录失败
                    alert(result.message || '授权码错误');
                    authCodeInput.value = '';
                    authCodeInput.focus();
                    loginButton.disabled = false;
                    loginButton.textContent = '登录';
                }
            } catch (error) {
                console.error('登录失败:', error);
                alert('登录失败，请重试');
                loginButton.disabled = false;
                loginButton.textContent = '登录';
            }
        });
        
        // Enter 键提交
        authCodeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
