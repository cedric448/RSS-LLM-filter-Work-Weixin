version: '3'

services:
  # Mock RSS 服务
  mock-rss:
    image: python:3.11-slim
    container_name: mock-rss-server
    restart: always
    working_dir: /app
    command: >
      sh -c "pip install flask -i https://pypi.tuna.tsinghua.edu.cn/simple &&
             python mock-rss-server.py"
    ports:
      - "5001:5000"
    volumes:
      - ./mock-rss-server.py:/app/mock-rss-server.py
      - ./config:/app/config
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
