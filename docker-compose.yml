version: '3.8'

services:
  # Mock RSS 服务
  mock-rss-server:
    build:
      context: .
      dockerfile: Dockerfile.mock
    container_name: mock-rss-server
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - n8n-network

  # n8n 工作流平台
  n8n:
    image: n8nio/n8n:1.48.0
    container_name: n8n-rss-ai
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=n8n_password_2026
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Shanghai
    volumes:
      - n8n-data:/home/node/.n8n
      - ./config:/config
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - mock-rss-server
    networks:
      - n8n-network

  # PostgreSQL 数据库 (可选，用于存储)
  postgres:
    image: postgres:15-alpine
    container_name: n8n-postgres
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_db_password
      - POSTGRES_DB=n8n
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - n8n-network

networks:
  n8n-network:
    driver: bridge

volumes:
  n8n-data:
  postgres-data:
